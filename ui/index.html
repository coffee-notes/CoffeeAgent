<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeAgent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ═══════════════════════════════════════════════════════════
         Tauri v2 Native Drag Region
         This is the ONLY drag handle. All CSS webkit-app-region
         rules have been removed. Tauri handles this at OS level.
         ═══════════════════════════════════════════════════════════ -->
    <div data-tauri-drag-region style="position: fixed; top: 0; left: 0; width: 100%; height: 35px; z-index: 9999; background: transparent;"></div>

    <!-- ═══════════════════════════════════════════════════════════
         Getting Started Banner
         ═══════════════════════════════════════════════════════════ -->
    <div class="getting-started" id="gettingStarted">
        <button class="gs-close" id="gsClose" aria-label="关闭">✕</button>
        <div class="gs-grid">
            <div class="gs-item">
                <span class="gs-icon">🔒</span>
                <strong>绝对隐私</strong>
                <span>本地断网运行，数据不离机</span>
            </div>
            <div class="gs-item">
                <span class="gs-icon">🔀</span>
                <strong>拒绝绑架</strong>
                <span>自由切换 Ollama 与云端大模型</span>
            </div>
            <div class="gs-item">
                <span class="gs-icon">⚡</span>
                <strong>极速唤醒</strong>
                <span>常驻菜单栏，随叫随到</span>
            </div>
        </div>
    </div>

    <div class="container">

        <!-- ═══ Left Panel: Context Files ═══ -->
        <div class="left-panel">
            <h3>≡ 上下文注入</h3>
            <div class="drop-zone" data-target="openclaw">
                <span class="icon">🐾</span>
                <p>OpenClaw SKILL.md</p>
                <input type="file" accept=".md,.txt" class="file-input" hidden>
            </div>
            <div class="drop-zone" data-target="hermes">
                <span class="icon">⚡</span>
                <p>Hermes 触发器</p>
                <input type="file" accept=".json,.yaml,.yml" class="file-input" hidden>
            </div>
            <div class="drop-zone" data-target="openhuman">
                <span class="icon">🧠</span>
                <p>OpenHuman 记忆树</p>
                <input type="file" accept=".json,.md" class="file-input" hidden>
            </div>
            <div class="file-info" id="fileInfo"></div>
        </div>

        <!-- ═══ Right Panel: Main Workspace ═══ -->
        <div class="right-panel">

            <!-- Input -->
            <div class="input-section">
                <h3>✎ Micro-Post</h3>
                <textarea id="microInput" placeholder="输入你的问题或要处理的文本... (⌘+Enter 提交)"></textarea>
                <div class="input-footer">
                    <div class="stats">
                        <span id="wordCount">0 词</span>
                        <span id="sentenceCount">0 句</span>
                        <span id="fleschScore">Flesch: 0</span>
                    </div>
                    <button id="submitBtn" class="primary-btn">⏎ 生成</button>
                </div>
            </div>

            <!-- Output -->
            <div class="output-section">
                <h3>◈ 输出</h3>
                <div id="streamOutput" class="stream-box"></div>
            </div>

            <!-- Model Dispatcher -->
            <div class="settings-section">
                <h3>⚙ 混合模型调度台</h3>
                <div class="settings-grid">

                    <div class="setting-item">
                        <label for="providerSelect">服务提供商</label>
                        <select id="providerSelect">
                            <option value="local-ollama">Local Ollama</option>
                            <option value="siliconflow">SiliconFlow 硅基流动</option>
                            <option value="openrouter">OpenRouter</option>
                            <option value="custom">Custom API</option>
                        </select>
                    </div>

                    <div class="setting-item" id="modelSelectWrapper">
                        <label for="modelSelect">模型 (本地已安装)</label>
                        <select id="modelSelect">
                            <option value="">— 检测中 —</option>
                        </select>
                    </div>

                    <div class="setting-item" id="modelInputWrapper">
                        <label for="modelInput">模型名称</label>
                        <input type="text" id="modelInput" placeholder="如 deepseek-ai/DeepSeek-V3">
                    </div>

                    <div class="setting-item" id="apiKeyWrapper">
                        <label for="apiKeyInput">API Key</label>
                        <input type="password" id="apiKeyInput" placeholder="sk-...">
                    </div>

                    <div class="setting-item" id="baseUrlWrapper">
                        <label for="baseUrlInput">Base URL</label>
                        <input type="text" id="baseUrlInput" placeholder="https://api.example.com/v1">
                    </div>

                </div>
                <div class="settings-footer">
                    <div class="status-indicator">
                        <span id="statusDot" class="status-dot"></span>
                        <span id="statusText">初始化中...</span>
                    </div>
                    <button id="saveSettingsBtn" class="primary-btn save-btn">💾 保存配置</button>
                </div>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
